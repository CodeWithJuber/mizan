# ═══════════════════════════════════════════════════════════════
# MIZAN — Nginx Reverse Proxy (No SSL — for initial setup / behind LB)
# Use this when SSL is handled by a load balancer or for local testing
# ═══════════════════════════════════════════════════════════════

upstream mizan_backend {
    server backend:8000;
}

upstream mizan_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Backend ──
    location /api/ {
        proxy_pass http://mizan_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket ──
    location /ws/ {
        proxy_pass http://mizan_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Frontend ──
    location / {
        proxy_pass http://mizan_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
